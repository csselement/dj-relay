services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /app/data/dj-relay.sqlite
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      TOKEN_SECRET: ${TOKEN_SECRET:?Set TOKEN_SECRET in .env}
      MEDIAMTX_AUTH_SECRET: ${MEDIAMTX_AUTH_SECRET:?Set MEDIAMTX_AUTH_SECRET in .env}
      PUBLIC_MEDIA_BASE: /media
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_PLAYBACK_URL: http://mediamtx:9996
      MAX_LISTENERS: 20
      DJ_DISCONNECT_GRACE_MS: ${DJ_DISCONNECT_GRACE_MS:-60000}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOGIN_WINDOW_MS: ${LOGIN_WINDOW_MS:-900000}
      LOGIN_CLIENT_FAILURE_LIMIT: ${LOGIN_CLIENT_FAILURE_LIMIT:-10}
      LOGIN_GLOBAL_FAILURE_LIMIT: ${LOGIN_GLOBAL_FAILURE_LIMIT:-200}
      LOGIN_TRACKED_CLIENT_LIMIT: ${LOGIN_TRACKED_CLIENT_LIMIT:-10000}
      TRANSCODE_MAX_ACTIVE: ${TRANSCODE_MAX_ACTIVE:-2}
      TRANSCODE_MAX_QUEUED: ${TRANSCODE_MAX_QUEUED:-4}
      TRANSCODE_QUEUE_WAIT_MS: ${TRANSCODE_QUEUE_WAIT_MS:-5000}
      TRANSCODE_TIMEOUT_MS: ${TRANSCODE_TIMEOUT_MS:-900000}
      RECORDINGS_PATH: /recordings
      RECORDING_SESSION_MAX_BYTES: ${RECORDING_SESSION_MAX_BYTES:-8589934592}
      RECORDING_ARCHIVE_MAX_BYTES: ${RECORDING_ARCHIVE_MAX_BYTES:-274877906944}
      RECORDING_HOST_FREE_FLOOR_BYTES: ${RECORDING_HOST_FREE_FLOOR_BYTES:-107374182400}
      RECORDING_HOST_FREE_WARNING_BYTES: ${RECORDING_HOST_FREE_WARNING_BYTES:-161061273600}
      RECORDING_ARCHIVE_WARNING_RATIO: ${RECORDING_ARCHIVE_WARNING_RATIO:-0.9}
      RECORDING_ACTIVE_SCAN_MS: ${RECORDING_ACTIVE_SCAN_MS:-5000}
      RECORDING_ARCHIVE_SCAN_MS: ${RECORDING_ARCHIVE_SCAN_MS:-60000}
      RECORDING_INGRESS_MAX_BYTES_PER_SECOND: ${RECORDING_INGRESS_MAX_BYTES_PER_SECOND:-131072}
      RECORDING_INGRESS_WINDOW_MS: ${RECORDING_INGRESS_WINDOW_MS:-30000}
      RECORDING_INGRESS_CONSECUTIVE_VIOLATIONS: ${RECORDING_INGRESS_CONSECUTIVE_VIOLATIONS:-2}
    volumes:
      - relay-data:/app/data
      - relay-recordings:/recordings:ro
    cpus: "2.0"
    mem_limit: 1536m
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  mediamtx:
    image: bluenviron/mediamtx:1.19.2
    restart: unless-stopped
    environment:
      MTX_AUTHHTTPADDRESS: http://app:3000/internal/mediamtx-auth?secret=${MEDIAMTX_AUTH_SECRET:?Set MEDIAMTX_AUTH_SECRET in .env}
      MTX_WEBRTCADDITIONALHOSTS: ${DJ_RELAY_DOMAIN:?Set DJ_RELAY_DOMAIN in .env}
    volumes:
      - ./deploy/mediamtx.yml:/mediamtx.yml:ro
      - relay-recordings:/recordings
    ports:
      - "8189:8189/udp"
      - "8189:8189/tcp"
    expose:
      - "8889"
      - "9996"
      - "9997"
    depends_on:
      app:
        condition: service_healthy

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    environment:
      DJ_RELAY_DOMAIN: ${DJ_RELAY_DOMAIN:?Set DJ_RELAY_DOMAIN in .env}
      CADDY_TLS_ISSUER: ${CADDY_TLS_ISSUER:-acme}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "443:443"
      - "443:443/udp"
      - "9440:9440"
      - "9440:9440/udp"
    depends_on:
      app:
        condition: service_healthy
      mediamtx:
        condition: service_started

volumes:
  relay-data:
  relay-recordings:
  caddy-data:
  caddy-config:
